# repo-tracker config (example)
# 実利用時は `cp config.example.yml config.yml` してから編集する。
# config.yml と repos.csv は .gitignore で無視。

gitlab:
  url: https://gitlab.com
  token_env: GITLAB_TOKEN

defaults:
  nest: 1                 # repos.csv で nest 省略時のデフォルト深さ

repos_file: repos.csv     # CSV パス (config.yml と同じディレクトリ基準で解決)
output_dir: site/data     # 出力先 (同上、相対なら config.yml と同じディレクトリ基準)
